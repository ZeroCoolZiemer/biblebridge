<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Offline — BibleBridge Reader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#faf8f5;color:#3d3229;text-align:center;padding:2rem}
[data-theme="dark"] body{background:#1a1512;color:#d4c8b8}
.wrap{max-width:400px}
.icon{font-size:3rem;margin-bottom:1rem;opacity:.6}
h1{font-family:'Lora',Georgia,serif;font-size:1.5rem;margin-bottom:.75rem;color:#9e7640}
p{line-height:1.6;margin-bottom:1.5rem;opacity:.8}
.btn{display:inline-block;padding:.75rem 1.5rem;background:#9e7640;color:#fff;text-decoration:none;border-radius:8px;border:none;cursor:pointer;font-size:1rem}
.btn:hover{background:#b8893f}
.verse{font-family:'Lora',Georgia,serif;font-style:italic;font-size:.95rem;opacity:.6;margin-top:2rem;line-height:1.6}
</style>
<script>try{var t=localStorage.getItem('bb_theme');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
</head>
<body>
<div class="wrap">
    <div class="icon">&#9729;</div>
    <h1>You're offline</h1>
    <p>This page hasn't been cached yet. Connect to the internet to load it, or go back to a chapter you've already read.</p>
    <button class="btn" onclick="history.back()">Go back</button>
    <p class="verse">"Your word is a lamp to my feet and a light to my path."<br>— Psalm 119:105</p>
</div>
</body>
</html>
